<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Macedonia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
</head>

<body>

    <div class="col-md-9 col-lg-10 ms-sm-auto p-md-4" th:fragment="especialidades">

    <h4>Especialidades</h4>  

    <hr class="my-3" />

        <table class="table table-striped table-sm">

              <thead>
                <tr>
                  <th scope="col">Codigo</th>
                  <th scope="col">Descricao</th>
                </tr>
              </thead>

              <tbody>

                <tr th:if="${listEsp.empty}">
				  <td colspan="2">Sem especialidades</td>
			    </tr>
			
                <tr th:each="esp : ${listEsp}">
                  <td><span th:text="${esp.codigo}"> Codigo </span></td>
				  <td><span th:text="${esp.descricao}"> Descricao </span></td>
			    </tr>

              </tbody>

            </table>
      
      </div>

</body>

</html>
