<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head th:insert = "~{index :: meta}">
</head>

<body>

  <div th:replace = "~{index :: header}"></div>

  <div class="container-fluid row">
   
    <div th:replace = "~{index :: menu}"></div>

    <div class="col-md-9 col-lg-10 ms-sm-auto p-md-4">

      <h4>Contratos</h4>  

      <hr class="my-3" />

      <table class="table table-striped table-sm">

        <thead>
          <tr>
            <th scope="col">OCS</th>
            <th scope="col">Tipo</th>
            <th scope="col">Início</th>
            <th scope="col">Fim</th>
          </tr>
        </thead>

        <tbody>
          <tr th:if="${lista.empty}">
            <td colspan="4">Sem contratos</td>
          </tr>
			
          <tr th:each="cont : ${lista}">
            <td><span th:text="${cont.ocs}"> OCS </span></td>
            <td><span th:text="${cont.tipoTermoContrato}"> Tipo </span></td>
            <td><span th:text="${cont.inicioData}"> Início </span></td>
            <td><span th:text="${cont.finalData}"> Fim </span></td>
          </tr>
        </tbody>

      </table>

    </div>
  
  </div>

</body>

</html>
