<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head th:insert = "~{index :: meta}">
</head>

<body>

  <div th:replace = "~{index :: header}"></div>

  <div class="container-fluid row">
   
    <div th:replace = "~{index :: menu}"></div>

    <div class="col-md-9 col-lg-10 ms-sm-auto p-md-4">

      <h4>Especialidades Médicas</h4>  

      <hr class="my-3" />

      <table class="table table-striped table-sm">

        <thead>
          <tr>
            <th scope="col">Código</th>
            <th scope="col">Descição</th>
          </tr>
        </thead>

        <tbody>
          <tr th:if="${lista.empty}">
            <td colspan="2">Sem especialidades</td>
          </tr>
			
          <tr th:each="esp : ${lista}">
            <td><span th:text="${esp.codigo}"> ID </span></td>
            <td><span th:text="${esp.descricao}"> Descricao </span></td>
          </tr>
        </tbody>

      </table>

    </div>
  
  </div>

</body>

</html>
