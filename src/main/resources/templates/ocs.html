<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head th:insert = "~{index :: meta}">
</head>

<body>

  <div th:replace = "~{index :: header}"></div>

  <div class="container-fluid row">
   
    <div th:replace = "~{index :: menu}"></div>

    <div class="col-md-9 col-lg-10 ms-sm-auto p-md-4">

      <h4>Organização Conveniada de Saúde</h4>  

      <hr class="my-3" />

      <table class="table table-striped table-sm">

        <thead>
          <tr>
            <th scope="col">CNP</th>
            <th scope="col">Descrição</th>
            <th scope="col">Especialidade</th>
            <th scope="col">Município</th>
            <th scope="col">UF</th>
          </tr>
        </thead>

        <tbody>
          <tr th:if="${lista.empty}">
            <td colspan="5">Sem OCS</td>
          </tr>
			
          <tr th:each="ocs : ${lista}">
            <td><span th:text="${ocs.cnpj}"> CNPJ </span></td>
            <td><span th:text="${ocs.descricao}"> Descricao </span></td>
            <td><span th:text="${ocs.especialidade}"> Especialidade </span></td>
            <td><span th:text="${ocs.municipio}"> Municipio </span></td>
            <td><span th:text="${ocs.uf}"> UF </span></td>
          </tr>
        </tbody>

      </table>

    </div>
  
  </div>

</body>

</html>
