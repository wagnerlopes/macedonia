<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head th:insert = "~{index :: meta}">
</head>

<body>

  <div th:replace = "~{index :: header}"></div>

  <div class="container-fluid row">
   
    <div th:replace = "~{index :: menu}"></div>

    <div class="col-md-9 col-lg-10 ms-sm-auto p-md-4">

      <h4>Profissionais Médicos</h4>  

      <hr class="my-3" />

      <table class="table table-striped table-sm">

        <thead>
          <tr>
            <th scope="col">CPF</th>
            <th scope="col">Nome</th>
            <th scope="col">Especialidade</th>
            <th scope="col">CRM</th>
          </tr>
        </thead>

        <tbody>
          <tr th:if="${lista.empty}">
            <td colspan="4">Sem profissionais</td>
          </tr>
			
          <tr th:each="med : ${lista}">
            <td><span th:text="${med.cpf}"> CPF </span></td>
            <td><span th:text="${med.nome}"> Nome </span></td>
            <td><span th:text="${med.especialidade.descricao}"> Especialidade </span></td>
            <td><span th:text="${med.crm}"> CRM </span></td>
          </tr>
        </tbody>

      </table>

    </div>
  
  </div>

</body>

</html>
